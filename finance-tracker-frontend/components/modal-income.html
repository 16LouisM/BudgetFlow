<!-- components/modal-income.html -->
<div id="incomeModal" class="modal">
  <div class="modal-content">
    <h2>Add Income</h2>
    <form id="incomeForm">
      <div class="form-group">
        <label for="category">Category :</label>
        <select id="category" name="category" required>
          <option value="" disabled selected>Select</option>
          <option value="Allowance">Allowance</option>
          <option value="NSFAS/Bursary/Scholarship">NSFAS / Bursary / Scholarship</option>
          <option value="Side-Hustle">Side-Hustle</option>
          <option value="Gift">Gift</option>
          <option value="Internship/Stipend">Internship / Stipend</option>
          <option value="Savings">Savings</option>
          <option value="Stokvel">Stokvel</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="description">Description :</label>
        <input type="text" id="description" name="description" placeholder="e.g. Monthly allowance" required>
      </div>

      <div class="form-group">
        <label for="amount">Amount (R) :</label>
        <input type="number" id="amount" name="amount" placeholder="e.g. 1500" step="0.01" required>
      </div>

      <div class="form-group">
        <label for="date">Date :</label>
        <input type="date" id="date" name="date" required>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-clear">Clear</button>
        <button type="button" class="btn-cancel">Cancel</button>
        <button type="submit" class="btn-add">Add</button>
      </div>
    </form>
  </div>
</div>
