<!-- components/modal-expense.html -->
<div id="expenseModal" class="modal">
  <div class="modal-content">
    <h2>Add Expense</h2>
    <form id="expenseForm">
      <div class="form-group">
        <label for="expenseCategory">Category :</label>
        <select id="expenseCategory" name="category" required>
          <option value="" disabled selected>Select</option>
          <option value="Groceries">Groceries</option>
          <option value="Transport">Transport</option>
          <option value="Dining Out">Dining Out</option>
          <option value="Health">Health</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Shopping">Shopping</option>
          <option value="Education">Education</option>
          <option value="Personal Care">Personal Care</option>
          <option value="Bills & Utilities">Bills & Utilities</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="expenseDescription">Description :</label>
        <input type="text" id="expenseDescription" name="description" placeholder="e.g. Dinner at restaurant" required>
      </div>

      <div class="form-group">
        <label for="expenseAmount">Amount (R) :</label>
        <input type="number" id="expenseAmount" name="amount" placeholder="e.g. 500" step="0.01" required>
      </div>

      <div class="form-group">
        <label for="expenseDate">Date :</label>
        <input type="date" id="expenseDate" name="date" required>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-clear">Clear</button>
        <button type="button" class="btn-cancel">Cancel</button>
        <button type="submit" class="btn-add">Add</button>
      </div>
    </form>
  </div>
</div>
